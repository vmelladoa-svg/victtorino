name: Candidatos Alila (semanal + agregar aprobados)

# 1) Cron: cada domingo genera la lista de candidatos nuevos + avisa por WhatsApp.
# 2) Manual (Run workflow): si escribes codigos en "codigos", los AGREGA al portal;
#    luego regenera la lista. Si dejas "codigos" vacio, solo regenera la lista.

on:
  schedule:
    - cron: '0 12 * * 0'   # domingos 12:00 UTC = 08:00 Chile
  workflow_dispatch:
    inputs:
      codigos:
        description: 'Codigos a AGREGAR (separados por coma). Vacio = solo generar la lista.'
        required: false
        default: ''

permissions:
  contents: write          # para commitear data/candidatos.json

jobs:
  candidatos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install psycopg2-binary requests cloudinary

      # Si viene con codigos (boton manual) -> agregar esos productos aprobados
      - name: Agregar aprobados
        if: ${{ github.event.inputs.codigos != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APROBADOS: ${{ github.event.inputs.codigos }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python agregar_aprobados.py

      # Siempre: (re)generar la lista de candidatos + WhatsApp
      - name: Buscar candidatos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python candidatos_semana.py

      # Guardar la lista actualizada en el repo (fuente de la pagina de revision)
      - name: Commit candidatos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidatos.json
          git commit -m "Candidatos Alila (auto) $(date -u +%Y-%m-%d)" || echo "sin cambios"
          git push
