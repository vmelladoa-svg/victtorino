name: Refresco inventario Portal Mayorista

on:
  schedule:
    - cron: "45 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: refresco-inventario
  cancel-in-progress: false

jobs:
  refresco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install --quiet psycopg2-binary requests

      - name: Respaldo de la base (antes del refresco)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python backup_portal.py

      - name: Refrescar catalogo desde AlilaTop
        id: refrescar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python refrescar_inventario.py

      - name: Reporte diario por WhatsApp
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          SYNC_STATUS: ${{ steps.refrescar.outcome }}
        run: python reporte_diario.py

      - name: Guardar el respaldo como artefacto (90 dias)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-portal-${{ github.run_id }}
          path: data/backups/
          retention-days: 90
          if-no-files-found: ignore
